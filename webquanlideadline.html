<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lịch Học Của Tôi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       CSS VARIABLES & RESET
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-50:  #eef6ff;
      --blue-100: #dbeafe;
      --blue-200: #bfdbfe;
      --blue-400: #60a5fa;
      --blue-500: #3b82f6;
      --blue-600: #2563eb;
      --blue-700: #1d4ed8;
      --teal-400: #2dd4bf;
      --teal-500: #14b8a6;
      --red-100:  #fee2e2;
      --red-400:  #f87171;
      --red-500:  #ef4444;
      --orange-100:#ffedd5;
      --orange-400:#fb923c;
      --green-100: #dcfce7;
      --green-500: #22c55e;
      --gray-50:  #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --white:    #ffffff;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md: 0 4px 16px rgba(59,130,246,.10), 0 2px 4px rgba(0,0,0,.06);
      --shadow-lg: 0 10px 30px rgba(59,130,246,.15), 0 4px 8px rgba(0,0,0,.08);
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --font-display: 'Baloo 2', cursive;
      --font-body:    'Nunito', sans-serif;
      --transition: .22s cubic-bezier(.4,0,.2,1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: linear-gradient(135deg, #e8f4ff 0%, #f0fdf4 50%, #eff6ff 100%);
      min-height: 100vh;
      color: var(--gray-800);
      line-height: 1.6;
    }

    /* ============================================================
       SCROLLBAR
    ============================================================ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--blue-200); border-radius: 99px; }

    /* ============================================================
       LAYOUT WRAPPER
    ============================================================ */
    .app {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }

    /* ============================================================
       HEADER
    ============================================================ */
    .header {
      text-align: center;
      padding: 40px 20px 28px;
      position: relative;
    }

    .header-deco {
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 220px; height: 4px;
      background: linear-gradient(90deg, var(--blue-400), var(--teal-400), var(--blue-600));
      border-radius: 0 0 4px 4px;
    }

    .header-logo {
      font-size: 38px;
      font-family: var(--font-display);
      font-weight: 800;
      background: linear-gradient(135deg, var(--blue-600) 0%, var(--teal-500) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      line-height: 1.15;
    }

    .header-subtitle {
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 4px;
    }

    .header-date {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--white);
      border: 1.5px solid var(--blue-100);
      padding: 8px 18px;
      border-radius: 99px;
      font-size: 14px;
      font-weight: 600;
      color: var(--blue-600);
      margin-top: 16px;
      box-shadow: var(--shadow-sm);
      animation: fadeSlideDown .5s ease both;
    }

    .header-date .dot {
      width: 7px; height: 7px;
      background: var(--teal-400);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.5; transform:scale(1.4); }
    }

    /* ============================================================
       STATS BAR
    ============================================================ */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 0 0 24px;
      animation: fadeSlideDown .55s .1s ease both;
    }

    .stat-card {
      background: var(--white);
      border-radius: var(--radius-md);
      padding: 16px;
      text-align: center;
      box-shadow: var(--shadow-sm);
      border: 1.5px solid var(--blue-100);
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

    .stat-num {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
    }
    .stat-card:nth-child(1) .stat-num { color: var(--blue-600); }
    .stat-card:nth-child(2) .stat-num { color: var(--green-500); }
    .stat-card:nth-child(3) .stat-num { color: var(--orange-400); }

    .stat-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    /* ============================================================
       ADD TASK FORM
    ============================================================ */
    .form-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-md);
      border: 1.5px solid var(--blue-100);
      margin-bottom: 24px;
      animation: fadeSlideDown .6s .15s ease both;
    }

    .form-title {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 700;
      color: var(--blue-700);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-title .icon { font-size: 20px; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .form-group { display: flex; flex-direction: column; gap: 5px; }

    .form-group label {
      font-size: 12px;
      font-weight: 700;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-group input,
    .form-group select {
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-700);
      background: var(--gray-50);
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
      outline: none;
      width: 100%;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--blue-400);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(59,130,246,.12);
    }

    .form-group.full { grid-column: 1/-1; }

    .btn-add {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--blue-500), var(--blue-700));
      color: var(--white);
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
      box-shadow: 0 4px 14px rgba(37,99,235,.35);
      letter-spacing: .3px;
    }

    .btn-add:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(37,99,235,.45);
    }

    .btn-add:active { transform: translateY(0); }

    .error-msg {
      font-size: 13px;
      color: var(--red-500);
      font-weight: 600;
      margin-top: 8px;
      display: none;
      animation: shake .4s ease;
    }

    .error-msg.show { display: block; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }

    /* ============================================================
       TABS
    ============================================================ */
    .tabs {
      display: flex;
      gap: 6px;
      background: var(--white);
      border-radius: var(--radius-md);
      padding: 6px;
      box-shadow: var(--shadow-sm);
      border: 1.5px solid var(--blue-100);
      margin-bottom: 20px;
      animation: fadeSlideDown .65s .2s ease both;
    }

    .tab-btn {
      flex: 1;
      padding: 10px 8px;
      border: none;
      border-radius: var(--radius-sm);
      background: transparent;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      color: var(--gray-500);
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }

    .tab-btn:hover:not(.active) {
      background: var(--blue-50);
      color: var(--blue-600);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, var(--blue-500), var(--blue-700));
      color: var(--white);
      box-shadow: 0 3px 10px rgba(37,99,235,.35);
    }

    /* ============================================================
       TASK LIST
    ============================================================ */
    .tab-content { display: none; animation: fadeSlideDown .35s ease both; }
    .tab-content.active { display: block; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .section-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      color: var(--gray-700);
    }

    .count-badge {
      background: var(--blue-100);
      color: var(--blue-600);
      font-size: 12px;
      font-weight: 800;
      padding: 2px 10px;
      border-radius: 99px;
    }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--gray-400);
    }

    .empty-state .empty-icon { font-size: 52px; margin-bottom: 12px; }
    .empty-state .empty-text {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
    }

    .task-list { display: flex; flex-direction: column; gap: 10px; }

    /* ============================================================
       TASK CARD
    ============================================================ */
    .task-card {
      background: var(--white);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      box-shadow: var(--shadow-sm);
      border: 1.5px solid var(--gray-100);
      transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
      position: relative;
      overflow: hidden;
      animation: cardIn .3s ease both;
    }

    @keyframes cardIn {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .task-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .task-card.completed { opacity: .65; }

    .task-card .priority-bar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      border-radius: 4px 0 0 4px;
    }
    .priority-bar.high   { background: var(--red-400); }
    .priority-bar.medium { background: var(--orange-400); }
    .priority-bar.low    { background: var(--teal-400); }

    .task-checkbox {
      width: 20px; height: 20px;
      border-radius: 6px;
      border: 2px solid var(--gray-300);
      background: var(--gray-50);
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    .task-checkbox.checked {
      background: var(--green-500);
      border-color: var(--green-500);
    }

    .task-checkbox.checked::after {
      content: '✓';
      color: white;
      font-size: 12px;
      font-weight: 900;
    }

    .task-body { flex: 1; min-width: 0; }

    .task-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--gray-800);
      word-break: break-word;
      transition: color var(--transition);
    }

    .task-card.completed .task-title {
      text-decoration: line-through;
      color: var(--gray-400);
    }

    .task-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 5px;
    }

    .task-date {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-400);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .priority-tag {
      font-size: 11px;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .priority-tag.high   { background: var(--red-100);    color: var(--red-500); }
    .priority-tag.medium { background: var(--orange-100); color: var(--orange-400); }
    .priority-tag.low    { background: var(--green-100);  color: var(--green-500); }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--gray-300);
      font-size: 18px;
      padding: 4px;
      line-height: 1;
      border-radius: 6px;
      transition: color var(--transition), background var(--transition);
      flex-shrink: 0;
    }

    .btn-delete:hover {
      color: var(--red-400);
      background: var(--red-100);
    }

    /* ============================================================
       WEEKLY VIEW
    ============================================================ */
    .week-grid { display: flex; flex-direction: column; gap: 14px; }

    .week-day-card {
      background: var(--white);
      border-radius: var(--radius-md);
      border: 1.5px solid var(--blue-100);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .week-day-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--blue-50);
      border-bottom: 1.5px solid var(--blue-100);
    }

    .week-day-name {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 800;
      color: var(--blue-700);
    }

    .week-day-date {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-400);
    }

    .week-day-header.today { background: linear-gradient(90deg, var(--blue-500), var(--blue-600)); }
    .week-day-header.today .week-day-name,
    .week-day-header.today .week-day-date { color: var(--white); }

    .week-tasks { padding: 10px 14px; }

    .week-task-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid var(--gray-100);
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-700);
    }

    .week-task-item:last-child { border-bottom: none; }

    .week-task-item .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .week-task-item .dot.high   { background: var(--red-400); }
    .week-task-item .dot.medium { background: var(--orange-400); }
    .week-task-item .dot.low    { background: var(--teal-400); }

    .week-task-item.completed-item { text-decoration: line-through; color: var(--gray-400); }

    .week-no-task {
      font-size: 13px;
      color: var(--gray-300);
      font-style: italic;
      padding: 10px 0;
    }

    /* ============================================================
       COMPLETED TAB EXTRAS
    ============================================================ */
    .btn-clear-all {
      background: var(--red-100);
      color: var(--red-500);
      border: none;
      border-radius: var(--radius-sm);
      padding: 7px 14px;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background var(--transition);
    }

    .btn-clear-all:hover { background: var(--red-400); color: var(--white); }

    /* ============================================================
       TOAST NOTIFICATION
    ============================================================ */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--gray-800);
      color: var(--white);
      padding: 12px 22px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(0,0,0,.25);
      transition: transform .35s cubic-bezier(.34,1.56,.64,1);
      z-index: 999;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ============================================================
       FOOTER
    ============================================================ */
    .footer {
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-300);
      margin-top: 48px;
      letter-spacing: 1px;
    }

    /* ============================================================
       ANIMATIONS
    ============================================================ */
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 600px) {
      .header-logo { font-size: 28px; }

      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }

      .stats-bar { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .stat-num { font-size: 22px; }
      .stat-label { font-size: 10px; }

      .tab-btn { font-size: 11.5px; padding: 9px 6px; }

      .task-card { padding: 12px 14px; }
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <div class="header-deco"></div>
      <div class="header-logo">📚 Lịch Học Của Tôi</div>
      <div class="header-subtitle">Quản lý lịch học &amp; nhiệm vụ</div>
      <div class="header-date">
        <span class="dot"></span>
        <span id="currentDate">--</span>
      </div>
    </header>

    <!-- STATS -->
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">Tổng nhiệm vụ</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statDone">0</div>
        <div class="stat-label">Hoàn thành</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statToday">0</div>
        <div class="stat-label">Hôm nay</div>
      </div>
    </div>

    <!-- FORM ADD TASK -->
    <div class="form-card">
      <div class="form-title">
        <span class="icon">✏️</span> Thêm nhiệm vụ mới
      </div>
      <div class="form-grid">
        <div class="form-group full">
          <label for="taskTitle">Tên nhiệm vụ</label>
          <input type="text" id="taskTitle" placeholder="Ví dụ: Làm bài tập Toán chương 3..." maxlength="120" />
        </div>
        <div class="form-group">
          <label for="taskDate">Ngày thực hiện</label>
          <input type="date" id="taskDate" />
        </div>
        <div class="form-group">
          <label for="taskPriority">Mức ưu tiên</label>
          <select id="taskPriority">
            <option value="low">🟢 Thấp</option>
            <option value="medium" selected>🟠 Trung bình</option>
            <option value="high">🔴 Cao</option>
          </select>
        </div>
        <div class="form-group" style="justify-content:flex-end">
          <label>&nbsp;</label>
          <button class="btn-add" onclick="addTask()">+ Thêm nhiệm vụ</button>
        </div>
      </div>
      <div class="error-msg" id="errorMsg">⚠️ Vui lòng nhập tên nhiệm vụ!</div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('today',this)">📋 Hôm nay</button>
      <button class="tab-btn" onclick="switchTab('week',this)">📅 Lịch tuần</button>
      <button class="tab-btn" onclick="switchTab('done',this)">✅ Đã hoàn thành</button>
    </div>

    <!-- TAB: HÔM NAY -->
    <div class="tab-content active" id="tab-today">
      <div class="section-header">
        <div class="section-title">📋 Nhiệm vụ hôm nay</div>
        <div class="count-badge" id="todayCount">0</div>
      </div>
      <div class="task-list" id="todayList"></div>
    </div>

    <!-- TAB: LỊCH TUẦN -->
    <div class="tab-content" id="tab-week">
      <div class="section-header">
        <div class="section-title">📅 Lịch tuần này</div>
      </div>
      <div class="week-grid" id="weekGrid"></div>
    </div>

    <!-- TAB: ĐÃ HOÀN THÀNH -->
    <div class="tab-content" id="tab-done">
      <div class="section-header">
        <div class="section-title">✅ Đã hoàn thành</div>
        <button class="btn-clear-all" onclick="clearAllDone()">🗑 Xóa tất cả</button>
      </div>
      <div class="task-list" id="doneList"></div>
    </div>

    <div class="footer">LỊCH HỌC CỦA TÔI &nbsp;·&nbsp; FRONTEND ONLY &nbsp;·&nbsp; LOCALSTORAGE</div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    // ============================================================
    // DATA MODULE — localStorage key: "lichHocTasks"
    // ============================================================
    const STORAGE_KEY = 'lichHocTasks';

    function loadTasks() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch { return []; }
    }

    function saveTasks(tasks) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    let tasks = loadTasks();

    // ============================================================
    // HELPER MODULE — Dates
    // ============================================================
    const VI_DAYS = ['Chủ Nhật','Thứ Hai','Thứ Ba','Thứ Tư','Thứ Năm','Thứ Sáu','Thứ Bảy'];

    function getTodayStr() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${dd}`;
    }

    function formatDateVI(dateStr) {
      if (!dateStr) return '';
      const [y,m,d] = dateStr.split('-');
      const dt = new Date(Number(y), Number(m)-1, Number(d));
      return `${VI_DAYS[dt.getDay()]}, ${d}/${m}/${y}`;
    }

    function getWeekDates() {
      const today = new Date();
      const day = today.getDay(); // 0=Sun
      const monday = new Date(today);
      monday.setDate(today.getDate() - (day === 0 ? 6 : day - 1));
      return Array.from({length:7}, (_,i) => {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        const y = d.getFullYear();
        const m = String(d.getMonth()+1).padStart(2,'0');
        const dd = String(d.getDate()).padStart(2,'0');
        return { str: `${y}-${m}-${dd}`, label: `${VI_DAYS[d.getDay()]}`, dateLabel: `${dd}/${m}/${y}` };
      });
    }

    // ============================================================
    // UI — Display current date
    // ============================================================
    document.getElementById('currentDate').textContent = formatDateVI(getTodayStr());

    // Set default date in picker
    document.getElementById('taskDate').value = getTodayStr();

    // ============================================================
    // STATS
    // ============================================================
    function updateStats() {
      const today = getTodayStr();
      document.getElementById('statTotal').textContent = tasks.length;
      document.getElementById('statDone').textContent  = tasks.filter(t=>t.completed).length;
      document.getElementById('statToday').textContent = tasks.filter(t=>t.date===today && !t.completed).length;
    }

    // ============================================================
    // FR-03 — Render Today Tab
    // ============================================================
    function renderToday() {
      const today = getTodayStr();
      const list  = document.getElementById('todayList');
      const badge = document.getElementById('todayCount');
      const todayTasks = tasks.filter(t => t.date === today && !t.completed);
      badge.textContent = todayTasks.length;

      if (todayTasks.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🎉</div>
            <div class="empty-text">Hôm nay chưa có nhiệm vụ nào!</div>
          </div>`;
        return;
      }
      list.innerHTML = todayTasks.map(t => taskCardHTML(t)).join('');
    }

    // ============================================================
    // FR-06 — Render Week Tab
    // ============================================================
    function renderWeek() {
      const weekDays = getWeekDates();
      const todayStr = getTodayStr();
      const grid     = document.getElementById('weekGrid');

      grid.innerHTML = weekDays.map(day => {
        const dayTasks = tasks.filter(t => t.date === day.str);
        const isToday  = day.str === todayStr;

        const tasksHtml = dayTasks.length === 0
          ? `<div class="week-no-task">Không có nhiệm vụ</div>`
          : dayTasks.map(t => `
              <div class="week-task-item ${t.completed ? 'completed-item' : ''}">
                <span class="dot ${t.priority}"></span>
                ${escHtml(t.title)}
              </div>`).join('');

        return `
          <div class="week-day-card">
            <div class="week-day-header ${isToday ? 'today' : ''}">
              <span class="week-day-name">${day.label}${isToday ? ' (Hôm nay)' : ''}</span>
              <span class="week-day-date">${day.dateLabel}</span>
            </div>
            <div class="week-tasks">${tasksHtml}</div>
          </div>`;
      }).join('');
    }

    // ============================================================
    // FR-07 — Render Done Tab
    // ============================================================
    function renderDone() {
      const list      = document.getElementById('doneList');
      const doneTasks = tasks.filter(t => t.completed);

      if (doneTasks.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <div class="empty-text">Chưa có nhiệm vụ nào được hoàn thành.</div>
          </div>`;
        return;
      }
      list.innerHTML = doneTasks.map(t => taskCardHTML(t)).join('');
    }

    // ============================================================
    // TASK CARD HTML Builder
    // ============================================================
    const PRIORITY_LABEL = { high: 'Cao', medium: 'Trung bình', low: 'Thấp' };

    function taskCardHTML(t) {
      return `
        <div class="task-card ${t.completed ? 'completed' : ''}" id="card-${t.id}">
          <div class="priority-bar ${t.priority}"></div>
          <div class="task-checkbox ${t.completed ? 'checked' : ''}"
               onclick="toggleComplete(${t.id})" title="Đánh dấu hoàn thành"></div>
          <div class="task-body">
            <div class="task-title">${escHtml(t.title)}</div>
            <div class="task-meta">
              <span class="task-date">📅 ${formatDateVI(t.date)}</span>
              <span class="priority-tag ${t.priority}">${PRIORITY_LABEL[t.priority]}</span>
            </div>
          </div>
          <button class="btn-delete" onclick="deleteTask(${t.id})" title="Xóa nhiệm vụ">✕</button>
        </div>`;
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ============================================================
    // FR-02 — Add Task
    // ============================================================
    function addTask() {
      const titleEl    = document.getElementById('taskTitle');
      const dateEl     = document.getElementById('taskDate');
      const priorityEl = document.getElementById('taskPriority');
      const errorEl    = document.getElementById('errorMsg');

      const title    = titleEl.value.trim();
      const date     = dateEl.value || getTodayStr();
      const priority = priorityEl.value;

      if (!title) {
        errorEl.classList.add('show');
        titleEl.focus();
        return;
      }
      errorEl.classList.remove('show');

      const newTask = {
        id: Date.now(),
        title,
        date,
        priority,
        completed: false
      };

      tasks.unshift(newTask);
      saveTasks(tasks);

      titleEl.value = '';
      dateEl.value  = getTodayStr();
      priorityEl.value = 'medium';

      renderAll();
      showToast('✅ Đã thêm nhiệm vụ!');
    }

    // Enter key shortcut
    document.getElementById('taskTitle').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    // ============================================================
    // FR-04 — Toggle Complete
    // ============================================================
    function toggleComplete(id) {
      const idx = tasks.findIndex(t => t.id === id);
      if (idx === -1) return;
      tasks[idx].completed = !tasks[idx].completed;
      saveTasks(tasks);
      renderAll();
      showToast(tasks[idx].completed ? '🎉 Đã hoàn thành!' : '↩️ Đã hoàn tác');
    }

    // ============================================================
    // FR-05 — Delete Task
    // ============================================================
    function deleteTask(id) {
      if (!confirm('Bạn có chắc muốn xóa nhiệm vụ này không?')) return;
      tasks = tasks.filter(t => t.id !== id);
      saveTasks(tasks);
      renderAll();
      showToast('🗑 Đã xóa nhiệm vụ');
    }

    // ============================================================
    // FR-07 — Clear All Done
    // ============================================================
    function clearAllDone() {
      const done = tasks.filter(t => t.completed);
      if (done.length === 0) { showToast('Không có nhiệm vụ đã hoàn thành'); return; }
      if (!confirm(`Xóa tất cả ${done.length} nhiệm vụ đã hoàn thành?`)) return;
      tasks = tasks.filter(t => !t.completed);
      saveTasks(tasks);
      renderAll();
      showToast('🗑 Đã xóa tất cả nhiệm vụ hoàn thành');
    }

    // ============================================================
    // TABS
    // ============================================================
    let currentTab = 'today';

    function switchTab(tab, btn) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      btn.classList.add('active');
      currentTab = tab;
      renderTab(tab);
    }

    function renderTab(tab) {
      if (tab === 'today') renderToday();
      else if (tab === 'week') renderWeek();
      else if (tab === 'done') renderDone();
    }

    function renderAll() {
      updateStats();
      renderTab(currentTab);
    }

    // ============================================================
    // TOAST
    // ============================================================
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ============================================================
    // FR-08 — Initial Load
    // ============================================================
    renderAll();
  </script>
</body>
</html>
